name: Tests & Linting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install pytest pytest-cov black flake8 mypy

    - name: Lint with flake8
      run: |
        # Stop on syntax errors or undefined names
        flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
        # Warn about other issues (but don't fail)
        flake8 src --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

    - name: Check formatting with black
      run: black --check src || true

    - name: Run tests with pytest
      run: |
        pytest src -v --tb=short --cov=src --cov-report=term-missing

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  frontend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: TypeScript type check
      run: npx tsc --noEmit

    - name: Run Vitest unit tests
      run: npx vitest run

    - name: Build production bundle
      run: npm run build

    - name: Check bundle size
      run: |
        GZIP_SIZE=$(find dist -name '*.js' -exec gzip -c {} \; | wc -c)
        GZIP_KB=$((GZIP_SIZE / 1024))
        echo "Bundle size (gzipped): ${GZIP_KB} kB"
        if [ "$GZIP_KB" -gt 170 ]; then
          echo "❌ Bundle exceeds 170 kB budget!"
          exit 1
        fi
        echo "✅ Bundle within 170 kB budget"

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -f docker/Dockerfile -t ev-routing:latest .
        docker build -f docker/Dockerfile -t ev-routing:${{ github.sha }} .

    - name: Test Docker image
      run: |
        docker run --rm ev-routing:latest python -m pytest src -v

  lint-summary:
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
    - name: Test Summary
      run: |
        echo "✅ Tests completed successfully!"
        echo "📊 All matrix combinations tested:"
        echo "  - Python: 3.10, 3.11, 3.12"
        echo "  - OS: Ubuntu, Windows, macOS"
